<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Temp Monitor</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .card {
      background: #222;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      font-size: 22px;
    }

    h2 {
      color: #00ffcc;
    }
  </style>
</head>

<body>

<h2>🔥 即時溫度監控</h2>

<div class="card">乳飲溫度: <span id="a">-</span></div>
<div class="card">乳品溫度: <span id="b">-</span></div>
<div class="card">乳品110: <span id="c">-</span></div>
<div class="card">一處回水: <span id="d">-</span></div>
<div class="card">二處回水: <span id="e">-</span></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
  // 🔥 改成你的 Firebase
  const firebaseConfig = {
    databaseURL: "https://temp-mon-dab85-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const ref = db.ref("plant/latest");

  ref.on("value", (snapshot) => {
    const data = snapshot.val();

    if (!data) return;

    document.getElementById("a").innerText = data["乳飲溫度"];
    document.getElementById("b").innerText = data["乳品溫度"];
    document.getElementById("c").innerText = data["乳品110"];
    document.getElementById("d").innerText = data["一處回水"];
    document.getElementById("e").innerText = data["二處回水"];
  });
</script>

</body>
</html>
